<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">E</div>
      <span class="logo-text">{{ org?.name || 'EnergI' }}</span>
    </div>

    <!-- Admin Nav -->
    <nav class="sidebar-nav" *ngIf="user?.role === 'ADMIN'">
      <p class="nav-section-label">Overview</p>
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/admin/iot-hub" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📡</span> IoT Live Hub
      </a>
      <p class="nav-section-label">Management</p>
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👥</span> Consumers
      </a>
      <a routerLink="/admin/tariff" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">⚡</span> Tariff Config
      </a>
      <a routerLink="/admin/bills" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🧾</span> Bills
      </a>
      <a routerLink="/admin/payments" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">💸</span> Payments
      </a>
      <a routerLink="/admin/notifications" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🔔</span> Notifications
      </a>
      <a routerLink="/admin/disputes" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">⚠️</span> Disputes
      </a>
    </nav>

    <!-- Consumer Nav -->
    <nav class="sidebar-nav" *ngIf="user?.role === 'CONSUMER'">
      <p class="nav-section-label">My Account</p>
      <a routerLink="/consumer/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a routerLink="/consumer/bills" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🧾</span> My Bills
      </a>
      <a routerLink="/consumer/notifications" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🔔</span> Notifications
      </a>
      <a routerLink="/consumer/disputes" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📋</span> Disputes
      </a>
    </nav>

    <div class="sidebar-footer">

      <button class="showcase-toggle-btn" 
              [class.inactive]="!showcaseService.isShowcaseActive"
              (click)="showcaseService.toggleShowcaseMode()">
        <span>✨ Showcase Mode</span>
        <div class="toggle-switch">
          <div class="toggle-knob"></div>
        </div>
      </button>

      <button class="theme-toggle-btn" (click)="themeService.toggleTheme()">
        <span class="nav-icon" *ngIf="themeService.isDarkMode()">☀️</span>
        <span class="nav-icon" *ngIf="!themeService.isDarkMode()">🌙</span>
        {{ themeService.isDarkMode() ? 'Light Mode' : 'Dark Mode' }}
      </button>
      <button class="logout-btn" (click)="handleLogout()">
        <span class="nav-icon">🚪</span> Logout
      </button>
    </div>

  </aside>

  <main class="main-content animate-in">
    <ng-content></ng-content>
  </main>
</div>
